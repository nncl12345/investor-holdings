# Render.com blueprint — deploys the FastAPI web service only.
#
# The full architecture includes Celery worker + beat for periodic EDGAR
# polling (see backend/app/workers/tasks.py). Those are excluded here
# because Render's free tier doesn't include background workers.
# In production they would run alongside; for the demo, data is seeded
# by running the same Celery tasks from a developer machine pointed at
# the Supabase URL.
#
# Docs: https://render.com/docs/blueprint-spec
#
# After GitHub is connected:
#   Render dashboard → "New +" → "Blueprint" → select this repo → Apply.
# Render reads this file and creates the service in one shot.
#
# Secrets (DATABASE_URL, REDIS_URL, GROQ_API_KEY, TAVILY_API_KEY, API_KEY,
# CORS_ALLOWED_ORIGINS, EDGAR_USER_AGENT) are filled in the dashboard
# — marked `sync: false` below so they don't land in git.

services:
  # -------- FastAPI web app (public, read-only demo) --------
  - type: web
    name: investor-holdings-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    dockerCommand: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false         # set in Render dashboard (Supabase URI)
      - key: REDIS_URL
        sync: false         # set in Render dashboard (Upstash rediss://)
      - key: EDGAR_USER_AGENT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: API_KEY
        sync: false         # set to a token_urlsafe(32) value
      - key: CORS_ALLOWED_ORIGINS
        sync: false         # set to https://<your-app>.vercel.app after Vercel deploy
