# Render.com blueprint — deploys web + worker + beat as three services.
# Docs: https://render.com/docs/blueprint-spec
#
# After GitHub is connected:
#   Render dashboard → "New +" → "Blueprint" → select this repo → Apply.
# Render reads this file and creates all three services in one shot.
#
# Secrets (DATABASE_URL, REDIS_URL, GROQ_API_KEY, TAVILY_API_KEY, API_KEY,
# CORS_ALLOWED_ORIGINS, EDGAR_USER_AGENT) are filled in the dashboard per
# service — marked `sync: false` below so they don't land in git.

services:
  # -------- FastAPI web app (public, read-only demo) --------
  - type: web
    name: investor-holdings-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    dockerCommand: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false         # set in Render dashboard (Supabase URI)
      - key: REDIS_URL
        sync: false         # set in Render dashboard (Upstash rediss://)
      - key: EDGAR_USER_AGENT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: API_KEY
        sync: false         # set to a token_urlsafe(32) value
      - key: CORS_ALLOWED_ORIGINS
        sync: false         # set to https://<your-app>.vercel.app after Vercel deploy

  # -------- Celery worker (processes EDGAR ingestion + LLM calls) --------
  - type: worker
    name: investor-holdings-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: free
    autoDeploy: true
    dockerCommand: celery -A app.workers.tasks worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: EDGAR_USER_AGENT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

  # -------- Celery beat (scheduler — fires the cron tasks) --------
  - type: worker
    name: investor-holdings-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: free
    autoDeploy: true
    dockerCommand: celery -A app.workers.tasks beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
