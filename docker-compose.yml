services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: holdings
      POSTGRES_PASSWORD: holdings
      POSTGRES_DB: holdings
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://holdings:holdings@db:5432/holdings
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A app.workers.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://holdings:holdings@db:5432/holdings
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  beat:
    build: ./backend
    command: celery -A app.workers.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://holdings:holdings@db:5432/holdings
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
